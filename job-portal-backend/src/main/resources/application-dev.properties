# ============================================
# DEV PROFILE - Local development only
# These defaults are overridden by env vars in production
# ============================================

# Database
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:SYSTEM}

# JWT
jwt.secret=${JWT_SECRET:mySecretKeyForJobPortalApplicationWhichIsAtLeast256BitsLongForHS256Algorithm}

# SMTP (Brevo) - set env vars DB_USERNAME, DB_PASSWORD, JWT_SECRET, SMTP_USERNAME, SMTP_PASSWORD
spring.mail.username=${SMTP_USERNAME:your-smtp-username}
spring.mail.password=${SMTP_PASSWORD:your-smtp-password}
