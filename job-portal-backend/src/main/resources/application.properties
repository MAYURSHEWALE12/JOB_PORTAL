# ============================================
# Server Configuration
# ============================================
server.port=8080
server.address=0.0.0.0
server.servlet.context-path=/api
server.forward-headers-strategy=native

# ============================================
# Database Configuration (MySQL)
# ============================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/job_portal}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:SYSTEM}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA/Hibernate Configuration
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.maximum-pool-size=5

# ============================================
# Logging
# ============================================
logging.level.root=INFO
logging.level.com.jobportal=INFO
logging.level.org.hibernate.engine.jdbc.env.internal=INFO
logging.level.com.zaxxer.hikari=INFO

# JWT Configuration
# ============================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Cloudinary Configuration
# ============================================
CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}

# ============================================
# Application Name
# ============================================
spring.application.name=Job Portal Backend
spring.profiles.active=dev

spring.jpa.open-in-view=false

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Resume storage path
app.resume.upload-dir=uploads/resumes
# Company Branding storage path
app.company.upload-dir=uploads/companies
# Avatar storage path
app.avatar.upload-dir=uploads/avatars

# ============================================
# Email Configuration (Brevo SMTP)
# ============================================
spring.mail.host=${SMTP_HOST:smtp-relay.brevo.com}
spring.mail.port=${SMTP_PORT:2525}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.default-encoding=UTF-8

# Job alert sender display
app.mail.from-name=HireHub
app.mail.from-address=${MAIL_FROM_ADDRESS:noreply@jobportal.com}

# ============================================
# OAuth2 Configuration
# ============================================
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.oauth2.frontend-url=${FRONTEND_URL:http://localhost:5173}

# WebSocket SockJS allowed origins
spring.messaging.sockjs.allowed-origin-patterns=*

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
